version: "1"
packages:
  - name: "repository"
    path: "./app/repository/sqlc"
    queries: "./app/repository/query/"
    schema: "./app/repository/migrations/"
    engine: "postgresql"
    emit_db_tags: true
    emit_prepared_queries: false
    emit_interface: true
    emit_json_tags: true
    emit_empty_slices: true